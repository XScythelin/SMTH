[platformio]
default_envs = esp32

[env]
build_flags =
  -std=gnu++17
  -Wall
  ; -DESPFC_DEBUG_SERIAL
;  -DESPFC_DEBUG_PIN=2 ; specify pin number (board specific)
;  -DESPFC_DEV_PRESET_MODES
;  -DESPFC_DEV_PRESET_BLACKBOX_SERIAL=1 ; specify port number (board specific)
;  -DESPFC_DEV_PRESET_BLACKBOX_FLASH
;  -DESPFC_DEV_PRESET_DSHOT
;  -DESPFC_DEV_PRESET_BRUSHED
;  -DESPFC_DEV_PRESET_SCALER
;  -DNO_GLOBAL_INSTANCES
;  -DDEBUG_ESP_PORT=Serial
;  -DDEBUG_ESP_CORE
;  -DDEBUG_ESP_WIFI
check_tool = cppcheck
; check_tool = clangtidy
check_src_filters =
  +<src/*>
  +<lib/Espfc/src/*>
  +<lib/EscDriver/src/*>
  +<test/*>
extra_scripts = 
  bin/pio_format.py
build_unflags =
  -std=gnu++11
  -ggdb

monitor_speed = 115200
upload_speed = 921600
; upload_speed = 460800
; monitor_filters = esp8266_exception_decoder
; monitor_filters = esp32_exception_decoder

lib_deps =
  yoursunny/WifiEspNow @ ^0.0.20230713
  https://github.com/rtlopez/espnow-rclink/archive/refs/tags/v0.1.1.zip
;  EspNowRcLink=symlink://../espnow-rclink

[env:esp32]
board = lolin32
platform = espressif32
framework = arduino
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.partitions = partitions_4M_nota.csv
lib_deps =
  ${env.lib_deps}
build_unflags =
  ${env.build_unflags}
build_flags =
  ${env.build_flags}
extra_scripts = 
  ${env.extra_scripts}
  bin/pio_merge_firmware.py

[env:esp32s3]
board = lolin_s3_mini
platform = espressif32
framework = arduino
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.partitions = partitions_4M_nota.csv
lib_deps =
  ${env.lib_deps}
build_unflags =
  ${env.build_unflags}
  -DBOARD_HAS_PSRAM
build_flags =
  ${env.build_flags}
  -DESP32S3
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
extra_scripts = 
  ${env.extra_scripts}
  bin/pio_merge_firmware.py
board_upload.use_1200bps_touch = yes
board_upload.wait_for_upload_port = yes
board_upload.require_upload_port = yes